version: "3.9"

# Redis service for Phase 2 networked benchmarks (SNKV vs Redis+NanoVectorDB)
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: run bench inside a container so filesystem paths are consistent
  bench:
    build:
      context: .
      dockerfile: Dockerfile.bench
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URI=redis://redis:6379
    volumes:
      - ./bench/_results:/app/bench/_results
    profiles:
      - bench
