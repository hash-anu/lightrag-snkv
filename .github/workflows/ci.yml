name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    name: Unit + compat tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[vector,test]"

      - name: Run unit + compat tests
        run: pytest tests/ -v --timeout=60 --ignore=tests/integration --ignore=tests/correctness

  integration:
    name: Integration tests (SNKV)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: unit
    env:
      LIGHTRAG_RUN_INTEGRATION: "true"
      LLM_BINDING: ${{ secrets.LLM_BINDING || 'openai' }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'gpt-4o-mini' }}
      LLM_BINDING_HOST: ${{ secrets.LLM_BINDING_HOST }}
      LLM_BINDING_API_KEY: ${{ secrets.LLM_BINDING_API_KEY }}
      EMBEDDING_BINDING: ${{ secrets.EMBEDDING_BINDING || 'openai' }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL || 'text-embedding-3-small' }}
      EMBEDDING_BINDING_HOST: ${{ secrets.EMBEDDING_BINDING_HOST }}
      EMBEDDING_BINDING_API_KEY: ${{ secrets.EMBEDDING_BINDING_API_KEY }}
      EMBEDDING_DIM: ${{ secrets.EMBEDDING_DIM || '1536' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[vector,test]" "lightrag-hku[api]>=1.4.0"

      - name: Run SNKV integration tests
        run: pytest tests/integration/test_lightrag_snkv.py -v --timeout=300

  benchmark-smoke:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: unit
    env:
      LIGHTRAG_RUN_INTEGRATION: "true"
      LLM_BINDING: ${{ secrets.LLM_BINDING || 'openai' }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'gpt-4o-mini' }}
      LLM_BINDING_HOST: ${{ secrets.LLM_BINDING_HOST }}
      LLM_BINDING_API_KEY: ${{ secrets.LLM_BINDING_API_KEY }}
      EMBEDDING_BINDING: ${{ secrets.EMBEDDING_BINDING || 'openai' }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL || 'text-embedding-3-small' }}
      EMBEDDING_BINDING_HOST: ${{ secrets.EMBEDDING_BINDING_HOST }}
      EMBEDDING_BINDING_API_KEY: ${{ secrets.EMBEDDING_BINDING_API_KEY }}
      EMBEDDING_DIM: ${{ secrets.EMBEDDING_DIM || '1536' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[vector,bench,test]" "lightrag-hku[api]>=1.4.0"

      - name: Run benchmark smoke (3 queries, 1 warmup, context-only)
        run: |
          python -m bench.run_all \
            --stacks snkv nano \
            --queries 3 \
            --warmup 1 \
            --modes hybrid \
            --context-only
